<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Palette ── */
:root{
  --bg:#09090B;
  --panel:#111827;
  --panel-alt:#18181B;
  --elevated:#1f2937;
  --border:rgba(255,255,255,0.05);
  --border-mid:#374151;
  --text:#FAFAFA;
  --text-2:#9ca3af;
  --text-3:#7FA8C9;
  --blue:#3b82f6;
  --blue-light:#60a5fa;
  --ocean-bg:#1B2A3B;
  --ocean-border:#2A5C8A;
  --ocean-text:#A8C8E8;
  --ocean-active:#2A5C8A;
  --ocean-strong:#5B9BD5;
  --green:#22C55E;
}

/* ── Animations ── */
@keyframes fade-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.6}}
.animate-fade-in{animation:fade-in 0.5s ease-out forwards}
.animate-slide-up{animation:slide-up 0.6s ease-out forwards}

/* ── Base ── */
html{font-size:16px}
body{font-family:'Inter','system-ui',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Header ── */
header{
  background:linear-gradient(135deg,#09090B 0%,#111115 100%);
  border-bottom:1px solid var(--border);
  padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  height:54px;position:sticky;top:0;z-index:100;
  animation:fade-in 0.5s ease-out forwards;
}
.logo{font-size:16px;font-weight:700;color:var(--blue-light);letter-spacing:.5px;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo svg{width:20px;height:20px}

/* ── Toolbar ── */
#toolbar{display:flex;align-items:center;gap:6px}
.tb-btn{
  padding:5px 13px;font-size:13px;font-weight:700;
  border-radius:6px;border:1px solid var(--ocean-border);
  background:var(--ocean-bg);color:var(--ocean-text);
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:background .15s ease,border-color .15s ease,color .15s ease,transform .15s ease,box-shadow .15s ease;
  white-space:nowrap;letter-spacing:.3px;
}
.tb-btn:hover{background:var(--ocean-active);color:#fff;border-color:var(--ocean-strong);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.25)}
.tb-btn:active{transform:translateY(0)}
.tb-btn.primary{background:var(--ocean-active);color:#fff;border-color:var(--ocean-strong);box-shadow:0 0 0 2px rgba(91,155,213,0.3)}
.tb-btn.success{background:#196F3D;color:#4ade80;border-color:#22C55E}
.tb-btn:disabled{opacity:.5;cursor:default;transform:none}
.sep{width:1px;height:20px;background:var(--border-mid);margin:0 2px}
#doc-name{font-size:12px;color:var(--text-3);font-family:'JetBrains Mono',monospace;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Layout ── */
#app{display:flex;min-height:calc(100vh - 54px)}
#toc-sidebar{
  width:230px;min-width:230px;background:var(--panel);
  border-right:1px solid var(--border-mid);
  padding:1.4rem 1rem;display:none;overflow-y:auto;
  position:sticky;top:54px;height:calc(100vh - 54px);
}
#toc-sidebar.open{display:block}
#toc-sidebar h4{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
#toc-list{list-style:none}
#toc-list a{display:block;font-size:13px;color:var(--text-2);text-decoration:none;padding:3px 8px;border-radius:4px;line-height:1.4;transition:background .1s,color .1s}
#toc-list a:hover{background:var(--elevated);color:var(--text)}
#toc-list .h1{font-weight:600}
#toc-list .h2{padding-left:14px}
#toc-list .h3{padding-left:26px;font-size:12px}

main{flex:1;padding:2.5rem 3rem;max-width:820px;margin:0 auto;width:100%}

/* ── Drop zone ── */
#drop-zone{
  border:2px dashed var(--border-mid);border-radius:10px;
  padding:3.5rem 2rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-bottom:1.5rem;
  background:var(--panel-alt);
}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--blue);background:rgba(59,130,246,.05)}
#drop-zone .icon{font-size:44px;margin-bottom:14px}
#drop-zone h2{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
#drop-zone p{font-size:14px;color:var(--text-2)}
#drop-zone p span{color:var(--blue-light);font-weight:500}
#file-input{display:none}

.input-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.input-section{margin-bottom:1.25rem}

/* ── URL row ── */
.url-row{display:flex;gap:8px}
.url-row input{
  flex:1;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;
  border-radius:6px;border:1px solid var(--ocean-border);
  background:var(--ocean-bg);color:#E8EDF2;outline:none;
  transition:border-color .2s;
}
.url-row input:focus{border-color:var(--ocean-strong)}
.url-row input::placeholder{color:var(--text-3)}
.url-row button{
  padding:8px 16px;font-size:13px;font-weight:700;
  border-radius:6px;border:1px solid var(--ocean-border);
  background:var(--ocean-active);color:#fff;cursor:pointer;
  transition:background .2s,transform .15s;letter-spacing:.3px;
}
.url-row button:hover{background:#1A4B7A;transform:translateY(-1px)}

/* ── Paste area ── */
textarea#paste-area{
  width:100%;min-height:110px;padding:10px 14px;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  border-radius:6px;border:1px solid var(--ocean-border);
  background:var(--ocean-bg);color:#E8EDF2;resize:vertical;outline:none;
  transition:border-color .2s;
}
textarea#paste-area:focus{border-color:var(--ocean-strong)}
textarea#paste-area::placeholder{color:var(--text-3)}
.paste-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.paste-row span{font-size:12px;color:var(--text-3);font-family:'JetBrains Mono',monospace}
.paste-row button{
  padding:7px 18px;font-size:13px;font-weight:700;
  border-radius:6px;border:1px solid var(--ocean-border);
  background:var(--ocean-active);color:#fff;cursor:pointer;
  transition:background .2s,transform .15s;
}
.paste-row button:hover{background:#1A4B7A;transform:translateY(-1px)}

/* ── Stats bar ── */
#stats-bar{
  display:none;font-size:12px;color:var(--text-3);gap:18px;
  margin-bottom:1.5rem;padding:10px 0;
  border-bottom:1px solid var(--border-mid);
  font-family:'JetBrains Mono',monospace;
}
#stats-bar.visible{display:flex;flex-wrap:wrap}
#stats-bar span b{color:var(--blue-light);font-weight:600}

/* ── Output ── */
#output{display:none;line-height:1.78;font-size:17px;color:var(--text)}
#output.visible{display:block;animation:slide-up 0.6s ease-out forwards}

#output h1{font-size:26px;font-weight:700;color:var(--blue-light);margin:2rem 0 .8rem;border-bottom:2px solid var(--ocean-border);padding-bottom:.4rem}
#output h2{font-size:20px;font-weight:600;color:#60a5fa;margin:1.8rem 0 .6rem;border-left:3px solid var(--ocean-active);padding-left:10px}
#output h3{font-size:17px;font-weight:600;color:var(--ocean-strong);margin:1.4rem 0 .5rem}
#output h4{font-size:15px;font-weight:600;color:var(--ocean-text);margin:1.1rem 0 .4rem}
#output p{margin:.7rem 0;color:#e5e7eb}
#output a{color:var(--blue-light);text-decoration:underline;text-underline-offset:2px}
#output ul,#output ol{padding-left:1.6rem;margin:.6rem 0}
#output li{margin:.3rem 0;color:#e5e7eb}
#output code:not([class]){font-family:'JetBrains Mono',monospace;font-size:.84em;background:rgba(59,130,246,.12);color:var(--blue-light);padding:2px 6px;border-radius:4px}
#output pre{background:#0d1117;border-radius:10px;overflow:hidden;margin:1.2rem 0;position:relative;border:1px solid var(--border-mid)}
#output pre .lang-badge{position:absolute;top:8px;right:10px;font-size:11px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
#output pre code{font-size:13px;padding:1rem 1.2rem;display:block;overflow-x:auto;background:transparent;color:inherit}
#output blockquote{border-left:3px solid var(--green);padding:.5rem 0 .5rem 1rem;margin:1rem 0;color:var(--text-2);background:rgba(34,197,94,.06);border-radius:0 6px 6px 0}
#output hr{border:none;border-top:1px solid var(--border-mid);margin:1.8rem 0}
#output table{width:100%;border-collapse:collapse;margin:1.2rem 0;font-size:14px;border:1px solid var(--border-mid);border-radius:8px;overflow:hidden}
#output th{background:#0f172a;color:#fff;text-align:left;padding:9px 14px;font-weight:600;font-size:13px;border-bottom:2px solid var(--border-mid)}
#output td{padding:8px 14px;border-bottom:1px solid var(--border-mid);color:#e5e7eb}
#output tr:nth-child(even) td{background:rgba(255,255,255,.02)}
#output tbody tr:hover td{box-shadow:inset 0 0 0 9999px rgba(0,0,0,.4);cursor:default;filter:contrast(1.1)}
#output tr:last-child td{border-bottom:none}
#output img{max-width:100%;border-radius:8px;margin:.5rem 0}
#output strong{font-weight:600}
#output em{font-style:italic}
#output del{text-decoration:line-through;color:var(--text-2)}
#output .task-li{list-style:none;margin-left:-1.6rem}
#output .task-li input{margin-right:7px;accent-color:var(--blue)}
#output h1:first-child{margin-top:0}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0D1B2A}
::-webkit-scrollbar-thumb{background:var(--ocean-border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3A7CAA}

/* ── Save modal ── */
#save-modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
#save-modal.open{display:flex}
.modal-box{
  background:var(--panel);border:1px solid var(--border-mid);
  border-radius:12px;padding:2rem;width:420px;max-width:90vw;
  animation:slide-up 0.3s ease-out forwards;
}
.modal-box h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.modal-box p{font-size:13px;color:var(--text-2);margin-bottom:1.4rem}
.modal-link-row{display:flex;gap:8px;margin-bottom:1.4rem}
.modal-link-row input{
  flex:1;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;
  border-radius:6px;border:1px solid var(--ocean-border);
  background:var(--ocean-bg);color:var(--blue-light);outline:none;
}
.copy-btn{
  padding:9px 16px;font-size:13px;font-weight:700;
  border-radius:6px;border:1px solid var(--green);
  background:#196F3D;color:#4ade80;cursor:pointer;
  white-space:nowrap;transition:background .2s;
}
.copy-btn:hover{background:#15803D}
.copy-btn.copied{background:#14532d;border-color:#4ade80;color:#4ade80}
.modal-close{
  width:100%;padding:8px;font-size:13px;font-weight:600;
  border-radius:6px;border:1px solid var(--border-mid);
  background:transparent;color:var(--text-2);cursor:pointer;
  transition:background .15s,color .15s;
}
.modal-close:hover{background:var(--elevated);color:var(--text)}

/* ── Saving spinner ── */
#saving-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);align-items:center;justify-content:center;flex-direction:column;gap:12px}
#saving-overlay.open{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border-mid);border-top-color:var(--blue-light);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#saving-overlay p{color:var(--text-2);font-size:14px}

@media(max-width:700px){main{padding:1.5rem 1.2rem}header{padding:0 1rem}#doc-name{display:none}#toc-sidebar{position:fixed;top:54px;left:0;height:calc(100vh - 54px);z-index:99;box-shadow:4px 0 24px rgba(0,0,0,.5)}}
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="lgo" x1="0" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      <rect width="22" height="22" rx="6.5" fill="url(#lgo)"/>
      <path d="M4.5 16L4.5 6.5L11 12L17.5 6.5L17.5 16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    MK Reader
  </a>
  <a href="/library" class="tb-btn" style="text-decoration:none;font-size:12px">☰ Library</a>
  <div id="toolbar">
    <span id="doc-name"></span>
    <button class="tb-btn" id="btn-toc" onclick="toggleToc()" style="display:none">☰ TOC</button>
    <div class="sep" id="sep1" style="display:none"></div>
    <button class="tb-btn primary" id="btn-save" onclick="startSave()" style="display:none">↑ Save &amp; share</button>
    <button class="tb-btn" id="btn-export" onclick="exportHtml()" style="display:none">↓ Export</button>
    <button class="tb-btn" id="btn-close" onclick="resetView()" style="display:none">✕</button>
  </div>
</header>

<div id="app">
  <nav id="toc-sidebar">
    <h4>Contents</h4>
    <ul id="toc-list"></ul>
  </nav>
  <main>
    <div id="input-area" class="animate-slide-up">
      <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📄</div>
        <h2>Drop your Markdown file here</h2>
        <p>or <span>click to browse</span> — .md · .txt · .markdown</p>
        <input type="file" id="file-input" accept=".md,.txt,.markdown">
      </div>
      <div class="input-section">
        <div class="input-label">Load from URL</div>
        <div class="url-row">
          <input type="text" id="url-input" placeholder="https://raw.githubusercontent.com/…/README.md">
          <button onclick="loadFromUrl()">Load</button>
        </div>
      </div>
      <div class="input-section">
        <div class="input-label">Paste Markdown</div>
        <textarea id="paste-area" placeholder="# Hello&#10;&#10;Paste your **markdown** here…"></textarea>
        <div class="paste-row">
          <span id="char-count">0 chars</span>
          <button onclick="renderPaste()">▶ Render</button>
        </div>
      </div>
    </div>

    <div id="stats-bar"></div>
    <article id="output"></article>
  </main>
</div>

<!-- Save modal -->
<div id="save-modal">
  <div class="modal-box">
    <h3>✓ Saved to library</h3>
    <p>Your document is live. Share this link — it's permanent.</p>
    <div class="modal-link-row">
      <input type="text" id="modal-link-input" readonly>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy link</button>
    </div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- Saving overlay -->
<div id="saving-overlay">
  <div class="spinner"></div>
  <p>Saving to library…</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
let rawSource = '', currentFilename = '';
Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';

// ── Input handlers ──
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) readFile(f); });
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });
document.getElementById('paste-area').addEventListener('input', e => { document.getElementById('char-count').textContent = e.target.value.length + ' chars'; });

function readFile(file) {
  currentFilename = file.name;
  document.getElementById('doc-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => { rawSource = e.target.result; renderMd(rawSource); };
  reader.readAsText(file);
}

function renderPaste() {
  rawSource = document.getElementById('paste-area').value.trim();
  if (!rawSource) return;
  currentFilename = 'pasted-content.md';
  document.getElementById('doc-name').textContent = 'Pasted content';
  renderMd(rawSource);
}

function loadFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const btn = document.querySelector('.url-row button');
  btn.textContent = 'Loading…'; btn.disabled = true;
  fetch(url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => { rawSource = text; currentFilename = url.split('/').pop() || 'document.md'; document.getElementById('doc-name').textContent = currentFilename; renderMd(text); btn.textContent = 'Load'; btn.disabled = false; })
    .catch(err => { btn.textContent = 'Load'; btn.disabled = false; alert('Could not fetch: ' + err.message); });
}

// ── Render ──
function renderMd(src) {
  const out = document.getElementById('output');
  out.innerHTML = parse(src);
  out.classList.add('visible');
  document.getElementById('input-area').style.display = 'none';
  ['btn-toc','btn-save','btn-export','btn-close','sep1'].forEach(id => document.getElementById(id).style.display = '');
  buildToc(); buildStats(src);
  Prism.highlightAllUnder(out);
}

// ── Markdown parser ──
function parse(src) {
  const lines = src.split('\n');
  let html = '', inCode = false, codeLang = '', codeLines = [], inUl = false, inOl = false, inTable = false;
  const flush = () => { if (inUl){html+='</ul>\n';inUl=false;} if (inOl){html+='</ol>\n';inOl=false;} if (inTable){html+='</tbody></table>\n';inTable=false;} };
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    if (line.startsWith('```')) {
      if (!inCode){flush();codeLang=line.slice(3).trim()||'plaintext';inCode=true;codeLines=[];continue;}
      else{html+=`<div style="position:relative"><pre class="language-${codeLang}"><span class="lang-badge">${esc(codeLang)}</span><code class="language-${codeLang}">${esc(codeLines.join('\n'))}</code></pre></div>\n`;inCode=false;continue;}
    }
    if (inCode){codeLines.push(line);continue;}
    if (/^\|.+\|/.test(line)){
      if (!inTable){flush();html+='<table><thead><tr>';inTable=true;splitRow(line).forEach(c=>html+=`<th>${inline(c.trim())}</th>`);html+='</tr></thead><tbody>\n';continue;}
      if (/^\|[\s\-:|]+\|/.test(line))continue;
      html+='<tr>'+splitRow(line).map(c=>`<td>${inline(c.trim())}</td>`).join('')+'</tr>\n';continue;
    } else if (inTable) flush();
    if (/^#{1,6} /.test(line)){flush();const lvl=line.match(/^(#+)/)[1].length;const txt=line.slice(lvl+1).trim();const id=txt.toLowerCase().replace(/[^\w]+/g,'-').replace(/^-|-$/g,'');html+=`<h${lvl} id="${id}">${inline(txt)}</h${lvl}>\n`;continue;}
    if (/^---+$|^\*\*\*+$/.test(line.trim())){flush();html+='<hr>\n';continue;}
    if (/^> /.test(line)){flush();html+=`<blockquote>${inline(line.slice(2))}</blockquote>\n`;continue;}
    if (/^\s*[-*+] \[[ x]\] /.test(line)){if(!inUl){html+='<ul>';inUl=true;}const checked=/\[x\]/.test(line);const txt=line.replace(/^\s*[-*+] \[[ x]\] /,'');html+=`<li class="task-li"><input type="checkbox" disabled${checked?' checked':''}> ${inline(txt)}</li>\n`;continue;}
    if (/^\s*[-*+] /.test(line)){if(!inUl){html+='<ul>';inUl=true;}html+=`<li>${inline(line.replace(/^\s*[-*+] /,''))}</li>\n`;continue;}
    if (/^\d+\. /.test(line)){if(!inOl){html+='<ol>';inOl=true;}html+=`<li>${inline(line.replace(/^\d+\. /,''))}</li>\n`;continue;}
    flush();
    if (line.trim()===''){html+='\n';continue;}
    html+=`<p>${inline(line)}</p>\n`;
  }
  flush(); return html;
}

function splitRow(l){return l.split('|').filter((c,i,a)=>i>0&&i<a.length-1);}
function inline(t){
  t=esc(t);
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/__(.+?)__/g,'<strong>$1</strong>');
  t=t.replace(/_(.+?)_/g,'<em>$1</em>');
  t=t.replace(/~~(.+?)~~/g,'<del>$1</del>');
  t=t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildToc(){
  const hs=document.querySelectorAll('#output h1,#output h2,#output h3');
  const list=document.getElementById('toc-list');list.innerHTML='';
  hs.forEach(h=>{const li=document.createElement('li');const a=document.createElement('a');a.href='#'+h.id;a.textContent=h.textContent;a.className=h.tagName.toLowerCase();a.onclick=e=>{e.preventDefault();h.scrollIntoView({behavior:'smooth',block:'start'});};li.appendChild(a);list.appendChild(li);});
}

function buildStats(src){
  const words=src.trim().split(/\s+/).length;
  const lines=src.split('\n').length;
  const headings=(src.match(/^#{1,6} /gm)||[]).length;
  const code=Math.floor(((src.match(/^```/gm)||[]).length)/2);
  const sb=document.getElementById('stats-bar');
  sb.innerHTML=`<span><b>${words.toLocaleString()}</b> words</span><span><b>${lines.toLocaleString()}</b> lines</span><span><b>${headings}</b> headings</span><span><b>${code}</b> code blocks</span>`;
  sb.classList.add('visible');
}

function toggleToc(){document.getElementById('toc-sidebar').classList.toggle('open');document.getElementById('btn-toc').classList.toggle('primary');}

// ── Export ──
function buildFullHtml(inner){
  const docTitle=(document.getElementById('doc-name').textContent||'Document');
  return`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${docTitle} — MK Reader</title>

<meta property="og:type" content="article">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>

#doc-bar a{color:#60a5fa;font-size:13px;font-weight:600;text-decoration:none}
#doc-bar button{font-size:12px;font-weight:600;padding:5px 14px;border:1px solid #2A5C8A;border-radius:5px;background:#1B2A3B;color:#A8C8E8;cursor:pointer;transition:background .15s}
#doc-bar button:hover{background:#2A5C8A;color:#fff}
h1{font-size:26px;font-weight:700;color:#60a5fa;margin:2rem 0 .8rem;border-bottom:2px solid #2A5C8A;padding-bottom:.4rem}
h2{font-size:20px;font-weight:600;color:#60a5fa;margin:1.8rem 0 .6rem;border-left:3px solid #2A5C8A;padding-left:10px}

tr:nth-child(even) td{background:rgba(255,255,255,.02)}

</style></head><body>
<div id="doc-bar"><a href="/">← MK Reader</a><button onclick="dlSelf()">↓ Download HTML</button></div>
${inner}
<script>function dlSelf(){const h='<!DOCTYPE html>'+document.documentElement.outerHTML;const b=new Blob([h],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=document.title.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.html';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},1000);}<\/script>
</body></html>`;

function exportHtml(){
  const html=buildFullHtml(document.getElementById('output').innerHTML);
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=(currentFilename||'document').replace(/\.\w+$/,'')+'.html';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}

// ── Save & share ──
async function startSave(){
  document.getElementById('saving-overlay').classList.add('open');
  document.getElementById('btn-save').disabled=true;
  const html=buildFullHtml(document.getElementById('output').innerHTML);
  try{
    const res=await fetch('/api/save',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:currentFilename,html,title:document.getElementById('doc-name').textContent})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Save failed');
    document.getElementById('saving-overlay').classList.remove('open');
    showSaveModal(window.location.origin+data.url);
  }catch(err){
    document.getElementById('saving-overlay').classList.remove('open');
    alert('Save failed: '+err.message);
  }finally{
    document.getElementById('btn-save').disabled=false;
  }
}

function showSaveModal(url){
  document.getElementById('modal-link-input').value=url;
  document.getElementById('save-modal').classList.add('open');
  document.getElementById('copy-btn').textContent='Copy link';
  document.getElementById('copy-btn').classList.remove('copied');
}

function copyLink(){
  const val=document.getElementById('modal-link-input').value;
  navigator.clipboard.writeText(val).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy link';btn.classList.remove('copied');},2500);
  });
}

function closeModal(){document.getElementById('save-modal').classList.remove('open');}
document.getElementById('save-modal').addEventListener('click',e=>{if(e.target===document.getElementById('save-modal'))closeModal();});

function resetView(){
  rawSource='';currentFilename='';
  document.getElementById('output').innerHTML='';
  document.getElementById('output').classList.remove('visible');
  document.getElementById('stats-bar').classList.remove('visible');
  document.getElementById('stats-bar').innerHTML='';
  document.getElementById('input-area').style.display='';
  document.getElementById('toc-sidebar').classList.remove('open');
  document.getElementById('doc-name').textContent='';
  ['btn-toc','btn-save','btn-export','btn-close','sep1'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('toc-list').innerHTML='';
}
</script>
